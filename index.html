<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal AI Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{font-family:system-ui}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-thumb{background:#bbb;border-radius:10px}
</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen flex">

<div id="loading" class="fixed inset-0 flex items-center justify-center text-xl bg-white dark:bg-black z-50">
Loading App...
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col fixed md:relative h-full z-40 transform -translate-x-full md:translate-x-0 transition-transform">

<div class="p-4 border-b flex justify-between">
<span class="font-bold">Chats</span>
<button id="closeSidebar" class="md:hidden">✕</button>
</div>

<button id="newChat" class="m-3 p-2 rounded bg-blue-500 text-white">New Chat</button>

<div id="chatList" class="flex-1 overflow-y-auto"></div>

<div class="p-3 border-t flex gap-2">
<button id="settingsBtn" class="flex-1 p-2 bg-gray-200 dark:bg-gray-700 rounded">⚙</button>
<button id="themeBtn" class="flex-1 p-2 bg-gray-200 dark:bg-gray-700 rounded">🌙</button>
</div>

</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col min-h-screen">

<!-- TOPBAR -->
<div class="p-3 border-b flex items-center gap-3">
<button id="openSidebar" class="md:hidden text-xl">☰</button>
<h1 class="font-semibold">Universal AI Chat</h1>
</div>

<!-- CHAT -->
<div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

<!-- INPUT -->
<div class="border-t p-3 bg-white dark:bg-gray-800 sticky bottom-0">
<div class="flex gap-2">
<input id="input" class="flex-1 p-3 rounded border dark:bg-gray-700" placeholder="Ask anything...">
<button id="send" class="px-4 bg-blue-500 text-white rounded">Send</button>
</div>
</div>

</div>

<!-- SETTINGS -->
<div id="settingsModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white dark:bg-gray-800 p-6 rounded w-80 space-y-4">

<h2 class="text-lg font-bold">Settings</h2>

<input id="apiKey" type="password" placeholder="OpenRouter API Key" class="w-full p-2 border rounded dark:bg-gray-700">

<input id="model" placeholder="Model" value="deepseek/deepseek-r1:free" class="w-full p-2 border rounded dark:bg-gray-700">

<textarea id="systemPrompt" placeholder="System Prompt" class="w-full p-2 border rounded dark:bg-gray-700"></textarea>

<div class="flex justify-end gap-2">
<button id="saveSettings" class="bg-blue-500 text-white px-3 py-1 rounded">Save</button>
<button id="closeSettings" class="px-3 py-1 bg-gray-300 rounded">Close</button>
</div>

</div>

</div>

<script>

const loading=document.getElementById("loading")

const input=document.getElementById("input")
const send=document.getElementById("send")
const messages=document.getElementById("messages")

const sidebar=document.getElementById("sidebar")
const openSidebar=document.getElementById("openSidebar")
const closeSidebar=document.getElementById("closeSidebar")

const chatList=document.getElementById("chatList")

const settingsModal=document.getElementById("settingsModal")
const settingsBtn=document.getElementById("settingsBtn")

const apiKeyInput=document.getElementById("apiKey")
const modelInput=document.getElementById("model")
const systemPromptInput=document.getElementById("systemPrompt")

let chats=JSON.parse(localStorage.getItem("chats")||"[]")
let currentChat=null

function save(){
localStorage.setItem("chats",JSON.stringify(chats))
}

function renderChats(){

chatList.innerHTML=""

chats.forEach((c,i)=>{

const el=document.createElement("div")
el.className="p-3 border-b cursor-pointer flex justify-between items-center"

el.innerHTML=`<span>${c.title}</span>
<div class="flex gap-1">
<button data-r="${i}">✏</button>
<button data-d="${i}">🗑</button>
</div>`

el.onclick=()=>{
currentChat=i
renderMessages()
}

chatList.appendChild(el)

})

}

function newChat(){

const chat={
title:"New Chat",
messages:[]
}

chats.unshift(chat)
currentChat=0
save()
renderChats()
renderMessages()

}

document.getElementById("newChat").onclick=newChat

function renderMessages(){

messages.innerHTML=""

if(currentChat===null)return

chats[currentChat].messages.forEach(m=>addMessage(m.role,m.content))

}

function addMessage(role,text){

const div=document.createElement("div")

div.className=role==="user"
?"text-right"
:"text-left"

const bubble=document.createElement("div")

bubble.className=role==="user"
?"inline-block bg-blue-500 text-white p-3 rounded-lg"
:"inline-block bg-gray-200 dark:bg-gray-700 p-3 rounded-lg"

bubble.innerHTML=marked.parse(text)

div.appendChild(bubble)

messages.appendChild(div)

messages.scrollTop=messages.scrollHeight

}

async function sendMessage(){

const text=input.value.trim()

if(!text||currentChat===null)return

input.value=""

chats[currentChat].messages.push({role:"user",content:text})

addMessage("user",text)

const aiDiv=document.createElement("div")
aiDiv.className="text-left"

const bubble=document.createElement("div")
bubble.className="inline-block bg-gray-200 dark:bg-gray-700 p-3 rounded-lg"

aiDiv.appendChild(bubble)
messages.appendChild(aiDiv)

const apiKey=localStorage.getItem("apiKey")
const model=localStorage.getItem("model")||"deepseek/deepseek-r1:free"
const system=localStorage.getItem("systemPrompt")||""

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
stream:true,
messages:[
{role:"system",content:system},
...chats[currentChat].messages
]
})
})

const reader=res.body.getReader()
const decoder=new TextDecoder()

let full=""

while(true){

const {value,done}=await reader.read()

if(done)break

const chunk=decoder.decode(value)

const lines=chunk.split("\n")

for(const l of lines){

if(l.startsWith("data: ")){

const data=l.replace("data: ","")

if(data==="[DONE]")break

try{

const json=JSON.parse(data)
const token=json.choices[0].delta?.content

if(token){

full+=token
bubble.innerHTML=marked.parse(full)

messages.scrollTop=messages.scrollHeight

}

}catch{}

}

}

}

chats[currentChat].messages.push({role:"assistant",content:full})
save()

}

send.onclick=sendMessage

input.addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage()
})

openSidebar.onclick=()=>{
sidebar.classList.remove("-translate-x-full")
}

closeSidebar.onclick=()=>{
sidebar.classList.add("-translate-x-full")
}

settingsBtn.onclick=()=>{
settingsModal.classList.remove("hidden")
settingsModal.classList.add("flex")

apiKeyInput.value=localStorage.getItem("apiKey")||""
modelInput.value=localStorage.getItem("model")||"deepseek/deepseek-r1:free"
systemPromptInput.value=localStorage.getItem("systemPrompt")||""
}

document.getElementById("closeSettings").onclick=()=>{
settingsModal.classList.add("hidden")
settingsModal.classList.remove("flex")
}

document.getElementById("saveSettings").onclick=()=>{

localStorage.setItem("apiKey",apiKeyInput.value)
localStorage.setItem("model",modelInput.value)
localStorage.setItem("systemPrompt",systemPromptInput.value)

settingsModal.classList.add("hidden")
settingsModal.classList.remove("flex")

}

document.getElementById("themeBtn").onclick=()=>{

document.documentElement.classList.toggle("dark")

localStorage.setItem("theme",
document.documentElement.classList.contains("dark")
?"dark":"light")

}

if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark")
}

chatList.addEventListener("click",e=>{

if(e.target.dataset.d){

const i=e.target.dataset.d
chats.splice(i,1)
save()
renderChats()
renderMessages()

}

if(e.target.dataset.r){

const i=e.target.dataset.r
const name=prompt("Rename chat",chats[i].title)

if(name){
chats[i].title=name
save()
renderChats()
}

}

})

if(chats.length===0)newChat()
else{
currentChat=0
renderChats()
renderMessages()
}

loading.style.display="none"

</script>

</body>
    </html>
